<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obrigada — ItsXliLix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;background:#fff;color:#14110b;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:32px;line-height:1.6;
}
.card{
  max-width:560px;text-align:center;
}
.dot{
  width:12px;height:12px;border-radius:50%;background:#4a7050;
  display:inline-block;margin-bottom:24px;
  box-shadow:0 0 0 6px rgba(74,112,80,0.12);
}
h1{font-family:'Fraunces',serif;font-size:48px;font-weight:400;line-height:1.05;letter-spacing:-1px;margin-bottom:16px}
h1 em{color:#6e1c2e;font-style:italic;font-weight:300}
p{font-size:17px;color:#4d4538;margin-bottom:14px;max-width:480px;margin-left:auto;margin-right:auto}
.box{
  margin:32px auto;padding:24px;border:1px solid rgba(20,17,11,0.08);border-radius:8px;
  background:#f5f3ed;text-align:left;
}
.box-lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#857c6f;margin-bottom:8px;font-weight:500}
.box p{font-size:14px;color:#14110b;margin:0;max-width:none}
.small{color:#857c6f;font-size:13px;margin-top:24px}
.small a{color:#6e1c2e}
</style>
</head>
<body>
<div class="card">
  <div class="dot"></div>
  <h1>Pagamento <em>confirmado</em>.</h1>
  <p>Já enviámos o teu link de acesso para o email que usaste no pagamento. Verifica a caixa de entrada — e o spam, por precaução.</p>
  <div class="box">
    <div class="box-lbl">Email não chegou em 5 min?</div>
    <p>Manda mensagem para <a href="mailto:hello@itsxlilix.com" style="color:#6e1c2e">hello@itsxlilix.com</a> com a referência da compra.</p>
  </div>
  <p class="small">Bem-vinda(o) ao manual. Agora é execução.</p>
</div>
</body>
</html>
