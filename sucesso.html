<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obrigada — ItsXliLix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ffffff;
  --ink:#0e0c08;
  --ink-2:#2a241b;
  --muted:#7a6f60;
  --accent:#6e1c2e;
  --rose:#c4889e;
  --line:rgba(14,12,8,0.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{
  font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:32px;line-height:1.6;
  background-image:
    radial-gradient(ellipse 60% 50% at 50% 0%, rgba(110,28,46,0.05), transparent 70%),
    radial-gradient(ellipse 40% 30% at 100% 100%, rgba(196,136,158,0.06), transparent 70%);
}
.card{max-width:580px;text-align:center;animation:rise 0.9s cubic-bezier(.2,.7,.2,1) both}
@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.tag{
  display:inline-flex;align-items:center;gap:10px;
  font-family:'Instrument Serif',serif;font-style:italic;
  font-size:14px;letter-spacing:1px;text-transform:uppercase;
  color:var(--accent);margin-bottom:32px;
}
.tag::before, .tag::after{content:"";width:24px;height:1px;background:var(--accent);opacity:0.4}

.dot{
  width:14px;height:14px;border-radius:50%;background:#4a7050;
  display:inline-block;margin-bottom:32px;
  box-shadow:0 0 0 8px rgba(74,112,80,0.1);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 8px rgba(74,112,80,0.1)}
  50%{box-shadow:0 0 0 14px rgba(74,112,80,0.04)}
}

h1{
  font-family:'Instrument Serif',serif;
  font-size:clamp(48px,7vw,72px);font-weight:400;line-height:0.95;letter-spacing:-1.5px;
  margin-bottom:24px;
}
h1 em{
  color:var(--accent);font-style:italic;font-weight:400;
  position:relative;display:inline-block;
}
h1 em::after{
  content:"";position:absolute;bottom:6px;left:0;right:0;height:8px;
  background:rgba(196,136,158,0.35);z-index:-1;border-radius:4px;
}

p{font-size:18px;color:var(--ink-2);margin-bottom:18px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.55}

.box{
  margin:40px auto;padding:28px 32px;border:1px solid var(--line);border-radius:14px;
  background:#fafaf8;text-align:left;max-width:480px;
}
.box-lbl{
  font-family:'Instrument Serif',serif;font-style:italic;
  font-size:12px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--accent);margin-bottom:10px;font-weight:400;
}
.box p{font-size:14px;color:var(--ink);margin:0;max-width:none;line-height:1.55}
.box a{color:var(--accent);font-weight:600;text-decoration:none;border-bottom:1px solid rgba(110,28,46,0.2)}
.box a:hover{border-bottom-color:var(--accent)}

.small{
  color:var(--muted);font-size:14px;margin-top:32px;
  font-family:'Instrument Serif',serif;font-style:italic;
}
</style>
</head>
<body>
<div class="card">
  <div class="dot"></div>
  <div class="tag">Pagamento confirmado</div>
  <h1>Obrigada.<br><em>Vemo-nos lá dentro.</em></h1>
  <p>Enviámos o teu link de acesso para o email que usaste no pagamento.<br>Verifica a caixa de entrada — e o spam, por precaução.</p>
  <div class="box">
    <div class="box-lbl">Email não chegou em 5 min?</div>
    <p>Manda mensagem para <a href="mailto:hello@itsxlilix.com">hello@itsxlilix.com</a> com a referência da compra.</p>
  </div>
  <p class="small">Agora é execução.</p>
</div>
</body>
</html>
